<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Flight Recorder</title>
    <style>
        :root {
            --bg: #0f111a;
            --surface: #161b2e;
            --surface2: #1e2540;
            --border: #252d47;
            --accent: #6366f1;
            --danger: #f87171;
            --warn: #fbbf24;
            --success: #34d399;
            --text: #e2e8f0;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 320px;
            min-height: 240px;
            user-select: none;
        }

        header {
            background: linear-gradient(135deg, #1e2540, #12172b);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 20px;
        }

        header h1 {
            font-size: 14px;
            font-weight: 600;
        }

        .status-pill {
            margin-left: auto;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 99px;
            font-weight: 600;
        }

        .status-idle {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }

        .status-recording {
            background: rgba(248, 113, 113, 0.2);
            color: var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .body {
            padding: 14px 16px;
        }

        /* Timer display */
        #timer-row {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        #timer-row.visible {
            display: flex;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        #timer-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        #timer-value {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--danger);
            margin-left: auto;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .btn-start {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-start:active {
            transform: none;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-stop:hover {
            transform: translateY(-1px);
        }

        .btn-marker {
            background: var(--surface2);
            color: var(--warn);
            border: 1px solid rgba(251, 191, 36, 0.2);
            font-size: 13px;
            padding: 8px;
            margin-top: 8px;
        }

        .btn-marker:hover {
            border-color: var(--warn);
            background: rgba(251, 191, 36, 0.08);
        }

        .btn-marker:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-viewer {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-size: 12px;
            padding: 7px;
            margin-top: 6px;
        }

        .btn-viewer:hover {
            border-color: var(--accent);
        }

        /* Toggles */
        .toggle-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .toggle-row:last-of-type {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 12px;
            color: var(--text-muted);
            flex: 1;
        }

        .toggle-sub {
            font-size: 10px;
            color: var(--text-muted);
            opacity: 0.6;
            display: block;
        }

        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 99px;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-slider:before {
            content: '';
            position: absolute;
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        input:checked+.toggle-slider {
            background: var(--accent);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(16px);
        }

        .toggles-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 12px;
            margin-bottom: 12px;
        }

        /* Bug marker note input */
        .marker-input-row {
            display: none;
            gap: 6px;
            margin-top: 6px;
        }

        .marker-input-row.visible {
            display: flex;
        }

        .marker-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }

        .marker-input:focus {
            border-color: var(--warn);
        }

        .marker-submit {
            background: var(--warn);
            color: #000;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        /* Session info */
        #session-info {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
        }

        #session-info.visible {
            display: block;
        }

        #session-id-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        #session-id-value {
            font-size: 11px;
            font-family: monospace;
            color: var(--accent);
            word-break: break-all;
        }

        /* Hotkeys row */
        .hotkeys {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .hotkey {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Toast inside popup */
        .toast {
            position: fixed;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 99;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">🛩️</div>
        <h1>QA Flight Recorder</h1>
        <div class="status-pill status-idle" id="status-pill">Idle</div>
    </header>

    <div class="body">
        <!-- Timer -->
        <div id="timer-row">
            <div class="rec-dot"></div>
            <span class="timer-label">Recording</span>
            <span id="timer-value">0:00</span>
        </div>

        <!-- Session ID -->
        <div id="session-info">
            <div id="session-id-label">Session ID</div>
            <div id="session-id-value">—</div>
        </div>

        <!-- Toggles -->
        <div class="toggles-section" id="toggle-section">
            <div class="toggle-row">
                <div class="toggle-label">
                    🎬 Record video
                    <span class="toggle-sub">Tab screen capture, low FPS</span>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="toggle-video" checked />
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <div class="toggle-label">
                    📦 Capture error bodies
                    <span class="toggle-sub">Response bodies for status ≥ 400</span>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="toggle-bodies" />
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- Start/Stop -->
        <button class="btn btn-start" id="btn-start">
            ● Start Recording
        </button>
        <button class="btn btn-stop" id="btn-stop" style="display:none">
            ■ Stop Recording
        </button>

        <!-- Bug Marker -->
        <button class="btn btn-marker" id="btn-marker" disabled>
            🐛 Add Bug Marker
        </button>

        <div class="marker-input-row" id="marker-row">
            <input type="text" class="marker-input" id="marker-note" placeholder="Optional note…" maxlength="200" />
            <button class="marker-submit" id="btn-submit-marker">Add</button>
        </div>

        <!-- Open viewer -->
        <button class="btn btn-viewer" id="btn-viewer">
            🗂 Open Viewer UI
        </button>

        <div class="hotkeys">
            <span class="hotkey">Ctrl+Shift+S: Start/Stop</span>
            <span class="hotkey">Ctrl+Shift+M: Bug Marker</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="popup.js"></script>
</body>

</html>
